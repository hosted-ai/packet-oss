version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "3002:3002"
    environment:
      - DATABASE_URL=mysql://gpucloud:gpucloud@db:3306/gpucloud
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_EDITION=oss
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gpucloud
      MYSQL_USER: gpucloud
      MYSQL_PASSWORD: gpucloud
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
